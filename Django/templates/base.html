
<!DOCTYPE html>
{% load static %}
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}collection{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="site-header">
        <nav class="nav-container">
            <a href="{% url 'home' %}" class="logo"><i class="fas fa-film"></i> MyMovieList</a>
            <ul class="nav-links">
                <li><a href="{% url 'home' %}">profile</a></li>
                <li><a href="{% url 'movie_list' %}">all movies</a></li>
                <li><a href="{% url 'movie_add' %}">+ add movie</a></li>
            </ul>
        </nav>
    </header>
    <main class="container">
        {% if messages %}
            <ul class="messages">
                {% for message in messages %}
                    <li class="message {{ message.tags }}">{{ message }}</li>
                {% endfor %}
            </ul>
        {% endif %}
        {% block content %}{% endblock %}
    </main>
    <footer class="site-footer">
        <p>© 2025 collection catalog | use Django creat</p>
    </footer>
</body>
</html>
